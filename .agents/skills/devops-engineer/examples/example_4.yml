# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lmagent-api
  labels:
    app: lmagent-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lmagent-api
  template:
    metadata:
      labels:
        app: lmagent-api
    spec:
      containers:
        - name: api
          image: ghcr.io/org/lmagent:latest
          ports:
            - containerPort: 8000
          
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lmagent-secrets
                  key: database-url
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

---
apiVersion: v1
kind: Service
metadata:
  name: lmagent-api
spec:
  selector:
    app: lmagent-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP